<!DOCTYPE html>
<html>
<head>

<title>Analytics Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="predict-body">

<div class="top-nav">
<a href="/predict" class="nav-btn">Salary Predictor</a>
</div>

<div class="analytics-container">

<h1>Salary Analytics Dashboard</h1>

<form method="POST">

<label>Predicted Salary (LPA)</label>
<input type="number" step="0.01" name="predicted" required>

<label>Actual Salary (LPA)</label>
<input type="number" step="0.01" name="actual" required>

<label>Select Chart Type</label>

<select name="chartType">

<option value="bar">Bar Chart</option>
<option value="line">Line Chart</option>
<option value="pie">Pie Chart</option>

</select>

<button type="submit">Analyze</button>

</form>

{% if accuracy %}

<h2>Model Accuracy: {{ accuracy }}%</h2>

<div class="analytics-grid">

<div class="chart-card">
<h3>Prediction vs Actual</h3>
<canvas id="comparisonChart"></canvas>
</div>

<div class="chart-card">
<h3>Salary Growth Projection</h3>
<canvas id="growthChart"></canvas>
</div>

</div>

<h2>Dataset Insights</h2>

<div class="analytics-grid">

<div class="chart-card">
<h3>Salary Distribution</h3>
<canvas id="salaryDistChart"></canvas>
</div>

<div class="chart-card">
<h3>Experience vs Salary</h3>
<canvas id="expSalaryChart"></canvas>
</div>

<div class="chart-card">
<h3>Qualification vs Avg Salary</h3>
<canvas id="qualSalaryChart"></canvas>
</div>

</div>

<script>

const predicted = {{ predicted }};
const actual = {{ actual }};
const chartType = "{{ chart_type }}";

// Comparison Chart

new Chart(
document.getElementById("comparisonChart"),
{
type: chartType,
data:{
labels:["Predicted","Actual"],
datasets:[{
label:"Salary Comparison",
data:[predicted,actual],
borderWidth:2
}]
}
});

// Growth Chart

new Chart(
document.getElementById("growthChart"),
{
type:"line",
data:{
labels:["1 Year","3 Years","5 Years","8 Years","10 Years"],
datasets:[{
label:"Salary Growth",
data:[
predicted*0.5,
predicted*0.8,
predicted,
predicted*1.4,
predicted*1.8
],
borderWidth:3,
tension:0.3
}]
}
});

// Dataset Charts

new Chart(document.getElementById("salaryDistChart"),{
type:"bar",
data:{
labels: {{ salary_bins|tojson }},
datasets:[{
label:"Employees",
data: {{ salary_counts|tojson }}
}]
}
});

new Chart(document.getElementById("expSalaryChart"),{
type:"line",
data:{
labels: {{ exp_labels|tojson }},
datasets:[{
label:"Avg Salary (LPA)",
data: {{ exp_values|tojson }},
borderWidth:3
}]
}
});

new Chart(document.getElementById("qualSalaryChart"),{
type:"bar",
data:{
labels: {{ qual_labels|tojson }},
datasets:[{
label:"Avg Salary (LPA)",
data: {{ qual_values|tojson }}
}]
}
});

</script>

{% endif %}

</div>

</body>
</html>
